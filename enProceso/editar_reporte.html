<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertransafal - Editar Reporte En Proceso</title>
    <link rel="stylesheet" href="../nuevoReportes/reporte.css">
</head>

<body>

    <header>
        <h1>SERTRANSAFAL</h1>
        <div class="sub_header">
            <span>Editando Vehículo en Taller</span>
            <span id="num_reporte">Cargando...</span>
        </div>
    </header>

    <main class="contenedor_principal">
        <form id="formulario_maestro">
            <!-- Campo oculto para saber qué ID estamos editando -->
            <input type="hidden" id="reporte_id">

            <section class="tarjeta_form">
                <h3><i class="icono">🚗</i> Datos de la Unidad</h3>
                <div class="cuadricula">
                    <div class="campo">
                        <label>Fecha Entrada</label>
                        <input type="datetime-local" id="fecha_entrada">
                    </div>
                    <div class="campo">
                        <label>Fecha Salida</label>
                        <input type="datetime-local" id="fecha_salida">
                    </div>
                    <div class="campo">
                        <label>Placa</label>
                        <input type="text" id="placa" placeholder="Ej: AB123CD">
                    </div>
                    <div class="campo">
                        <label>Vehículo</label>
                        <input type="text" id="vehiculo_marca" placeholder="Ej: Toyota">
                    </div>
                    <div class="campo">
                        <label>Modelo</label>
                        <input type="text" id="Modelo" placeholder="Ej: Hilux">
                    </div>
                    <div class="campo">
                        <label>Kilometraje Actual</label>
                        <input type="number" id="km_actual">
                    </div>
                    <div class="campo">
                        <label>Próximo Kilometraje</label>
                        <input type="number" id="proximo_km">
                    </div>
                </div>
            </section>

            <section class="tarjeta_form">
                <h3><i class="icono">🔧</i> Informe Técnico</h3>
                <label>Falla Detectada</label>
                <textarea id="falla_detectada" rows="3"></textarea>

                <label>Trabajo Realizado</label>
                <textarea id="trabajo_realizado" rows="3"></textarea>

                <label>Repuestos Utilizados</label>
                <textarea id="repuestos" rows="3"></textarea>

                <label>Pedido de Repuestos</label>
                <textarea id="pedido_repuestos" rows="3"></textarea>
            </section>

            <section class="tarjeta_form">
                <h3><i class="icono">📸</i> Evidencia Fotográfica</h3>
                <div class="zona_carga" onclick="document.getElementById('input_fotos').click()">
                    <p>Toca aquí para subir más fotos del vehículo</p>
                    <input type="file" id="input_fotos" multiple accept="image/*" style="display:none"
                        onchange="taller.previsualizarFotosExtra(event)">
                </div>
                <div id="vista_previa_fotos" class="galeria_mini"></div>
            </section>

            <div class="acciones_finales">
                <!-- Como ya está en proceso, si le da a "Guardar Cambios" sigue en proceso (false) -->
                <button class="btn_proceso" type="button" onclick="taller.actualizarReporte(false)">💾 Guardar
                    Avance</button>
                <button class="btn_finalizar" type="button" onclick="taller.actualizarReporte(true)">✔️ Finalizar
                    Reparación</button>
                <a href="../finalizados/lista_reportes.html?filtro=proceso" class="btn_cancelar">❌ Volver</a>
            </div>

        </form>
    </main>

    <script src="../nuevoReportes/fichero_registros.js"></script>
    <script>
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (id) {
                taller.cargarReporteParaEdicion(id);
            }
        };
    </script>
</body>

</html>
